services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: kgm-php-app
    container_name: kgm-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kgm-network

  web:
    image: nginx:alpine
    container_name: kgm-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kgm-network

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: kgm-node
    container_name: kgm-node
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./resources/js:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
    command: npm run dev
    networks:
      - kgm-network

  mysql:
    image: mysql:8.0
    container_name: kgm-mysql
    restart: unless-stopped
    platform: linux/amd64
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-karacabey_gross_market}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-karacabey}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3307:3306"
    volumes:
      - kgm-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - kgm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kgm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - kgm-redis-data:/data
    networks:
      - kgm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  kgm-network:
    driver: bridge

volumes:
  kgm-mysql-data:
  kgm-redis-data:
