services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: kgm-php-app
    container_name: kgm-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
      - redis
    networks:
      - kgm-network

  web:
    image: nginx:alpine
    container_name: kgm-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kgm-network

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: kgm-node
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./resources/js:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
    command: npm run dev
    networks:
      - kgm-network

  db:
    image: postgres:15-alpine
    container_name: kgm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-karacabey}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - kgm-db-data:/var/lib/postgresql/data
    networks:
      - kgm-network

  redis:
    image: redis:alpine
    container_name: kgm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - kgm-redis-data:/data
    networks:
      - kgm-network

networks:
  kgm-network:
    driver: bridge

volumes:
  kgm-db-data:
  kgm-redis-data:
